body:
  text: 次請五帝衆仙靈官安五香火之下東方九氣青天安寳華林青靈始老君蒼帝君九氣天君太上眞王青腰玉女東郷諸靈官某帝眞人某甲再拜五香稽首奉請降青華元陽門南方三氣丹天梵寳昌陽丹靈眞老君赤帝君朱丹三氣天君元氣丈人朱宫太丹玉女南郷詣靈官某帝眞人某甲再拜五香稽首奉請降洞陽太光門中央元洞太帝之天玉寳元靈元老君黄帝君太帝眞人子丹黄庭戊己天倉玉女中黄太帝官君某帝眞人某甲再拜五香稽首奉請降兀黄髙晨門西方七氣之天七寳金門皓靈皇老君白帝君明石七氣天君太上白素玉女西郷諸靈官某帝眞人某甲再拜五香稽首奉請降通隂全開門北方五氣玄天洞隂朔單鬰絶五靈玄老君黒帝君玄滋五氣天君太上靈君夜无玉女北郷諸靈官某帝眞人某甲再拜五香稽首奉請降陰生廣靈門九天衆靈五嶽靈山眞人江河四瀆三官九府諸靈官地仙玉女五嶽飛仙神仙諸仙官君某帝眞人某甲再拜五香稽首奉請降元黄髙晨門朱書五簡安五香火下讀簡畢便請一帝再拜下簡以次如法後一簡今在中央之右送天官都畢埋著中方此玄都舊典不得儀式則天眞不降誤兆被殃也安簡畢調聲自陳某月某朔某日甲子某州郡縣郷里某帝先生某甲年如干嵗以某年月某日從某嶽先生眞人受太上靈寳五老眞文自然赤書五篇符命謹依大道玄都舊典科法清齋沐浴香薰神室奉請五帝君五帝靈官眞人神仙玉女謹以名香棗湯甘果表於丹心潔整身神伺迎上皇天尊請遣五體眞官三䰟七魄三宫眞人上到九天之宫三天之宫五外之郷青芽之天朱丹之天太帝之天中黄之天明石之天玄滋之天八方五帝眞人之庭通宣所啓執齋奉禮虚心注仰願廻靈駕暫降某郡縣郷里中臨映丹誠降五符之眞歆饗微禮薄饌畢再拜伏地良久乃起長跪取東方簡讀文畢下簡故處重請上神奉降東方靈威仰蒼帝君青芽九氣天君太上眞王青腰玉女東郷諸靈官次讀南方簡如上法奉降南方赤熛弩赤帝君朱丹三氣天君元氣丈人朱宫太丹玉女南郷諸靈官次讀中央簡如上法奉降中央合樞紐黄帝君太帝眞人子丹黃庭戊己天倉玉女中黄太帝官君次讀西方簡如上法奉降西方矅魄寳白帝君明石七氣天君太上白素玉女西郷諸靈官次讀北方簡如上法奉降北方隱俠局黑帝君玄滋五氣天君太上靈君夜光玉女北郷諸靈官次讀衆靈簡如上法奉降九天衆靈五嶽靈山眞人江河四瀆三官九府諸靈官地仙玉女五嶽飛仙神仙諸仙官君右請五帝東眞六位合十二拜奉請天眞畢五過上湯炷香而自陳啓某以有幸宿世因縁九天之劫轉及某身遭遇明運道法流行得以穢身參染靈文五篇赤書五符寳經自叨竊以來尊仰上眞心希神仙而精誠淺薄未能感靈常恐罪身沉頓囂穢淪沒九衆天慈廣大展其效心守誠信向長齋思神念善脩生志度無窮而精誠淺狹未能自宣靈文深與天尊遐邈未敢自聞今上吉良日整身清齋告祭五靈五老五帝諸君丈人上勞神光至眞天尊曲降卑賤誠慚誠懼不敢自寧不勝天光遐照無細縁兹上陳其承先師舊典以丹青告誓盟約閉口奉修不敢泄漏五入乃宣以定神契五帝䦕聞乞眞符經圖神靈侍衛營護某身登山渉嶺出入林磵所求所向皆得如心金石開通神明契接萬願咸從採芝採藥不得隱藏山精伏匿邪試不干虎狼毒螫今不加身玉女神童給使東西五帝靈氣降入其形安鎭五腑内外聦明心開意通逆知吉凶三尸消滅九蟲不生身有竒毛早得神仙惟蒙至尊大帝直垂慈思下流衆庶賜如所陳不勝洪澤輒自効勤臣某誠惶誠恐稽首再拜又三過上湯上酒伏地若私有所陳目適意啓乙啓願畢上勞東方靈威仰蒼啼君青芽九氣天君太上眞王青腰玉女東郷諸靈官各還神房便散香再拜次上勞南方赤熛弩赤帝君朱丹三氣天君元氯大人朱宫太丹玉女南郷諸靈官各還神房便敬香再拜次上勞中央舍樞紐黃帝君太帝眞人子丹黃庭戊己天倉玉女中黄太帝官君各還神房便散香再拜次上勞西方矅魄寳白帝君明石七氣天君太上白素玉女西鄉諸靈官各還神房便散香再拜次上勞北方隠俠局黒帝君玄滋五氣天君太上靈君夜光玉女北郷諸靈官各還神房便散香再拜次上勞九天衆靈五嶽靈山眞人江河四瀆三官九府諸靈官地仙玉女五嶽飛仙神仙諸仙宫君各還神房便散香再拜奉禮醮祭法事都畢取簡随方埋著五門下衆眞簡埋中央門下右三年一㸃九年三醮都止道士張承先曰受靈寳五老赤書二籙杖䇿之日冝即依法祭醮以招天眞幽映感降在乎精誠後則三年一請祈于必通今撰出立成以爲常儀至學之士勿虧之矣太上洞玄靈寳五帝醮祭招眞玉訣
