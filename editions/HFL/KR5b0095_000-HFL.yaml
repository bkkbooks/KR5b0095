front:
  text: 太上洞玄靈寳五帝醮祭招眞玉訣道言靈寳赤書五篇眞文篇鎭一方皆元始自然之書五老與五帝侍衛五方靈官紀録禁限一年三開衆仙度眞玄科舊典上宫諸眞人及五嶽神仙三年一奉靈寳五帝靈官散花燃燈香湯甘果上獻天眞以存靈氣後學常能爾者則靈寳五帝感乎精誠五方靈官當之喜欣凡禮無濃薄意從中來苟有至情人神感焉故書其品戒祕而修行舊典降致靈寳五帝靈官法以春用甲寅乙卯夏用丁巳丙午季用戊辰戊戍已未已丑秋用庚申辛酉冬用癸亥壬子建王之日於靈嶽作髙壇四方欄纂束西南北王上用五門安五榜也榜依别文在大盟儀中安五門畢當四面安障勿今當風使火光氣亂毎今火氣宻勿令廣照使靈氣散也敷一五尺淨席随節安之春則向東方也每以名香淨茶棗湯鮮果潔淨法座隨豐珍之宜用淨杯十一枚杓今新好柈三枚皆今精潔二柈各盛五杯其一柈盛一杯一柈在五杯柈者下流比五香火相次於柈前果亦三柈如之餘湯即别器請著前列南和丹繒五尺絳紋繒也於案上清靈寳五篇眞文五符割碧林之帛五尺青紋繒也覆眞文符上安著座後令符處丹青中以爲落髪噏血之盟也青以代髪丹代唅血之盟誓眞人不傷神禎德故以代之也香用五種雜和之香爐每今新好相連安之束帶跪請毎令徐聲下氣天眞宻感而降當朱書白銀剌上六枚
