front:
  text: 太上洞玄靈寶五帝醮祭招真玉訣道言靈寶赤書五篇真文篇鎮一方皆元始自然之書五老與五帝侍衛五方靈官紀録禁限一年三開衆仙度真玄科舊典上宫諸真人及五嶽神仙三年一奉靈寶五帝靈官散花燃燈香湯甘果上獻天真以存靈氣後學常能爾者則靈寶五帝感乎精誠五方靈官當之喜欣凡禮無濃薄意從中來苟有至情人神感焉故書其品戒祕而修行舊典降致靈寶五帝靈官法以春用甲寅乙卯夏用丁巳丙午季用戊辰戊戍已未已丑秋用庚申辛酉冬用癸亥壬子建王之日於靈嶽作髙壇四方欄纂束西南北王上用五門安五榜也榜依别文在大盟儀中安五門畢當四面安障勿今當風使火光氣亂每今火氣密勿令廣照使靈氣散也敷一五尺淨席隨節安之春則向東方也每以名香淨茶棗湯鮮果潔淨法座隨豐珍之宜用淨杯十一枚杓今新好柈三枚皆今精潔二柈各盛五杯其一柈盛一杯一柈在五杯柈者下流比五香火相次於柈前果亦三柈如之餘湯即别器請著前列南和丹繒五尺絳紋繒也於案上清靈寶五篇真文五符割碧林之帛五尺青紋繒也覆真文符上安著座後令符處丹青中以為落髮吸血之盟也青以代髮丹代唅血之盟誓真人不傷神禎德故以代之也香用五種雜和之香爐每今新好相連安之束帶跪請每令徐聲下氣天真密感而降當朱書白銀剌上六枚
